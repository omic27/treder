<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading OS Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Trading OS Dashboard</h1>
      <section class="grid">
        <article class="card"><h2>Current Deposit</h2><p id="current-deposit">-</p></article>
        <article class="card"><h2>Total PnL</h2><p id="total-pnl">-</p></article>
        <article class="card"><h2>Win Rate</h2><p id="win-rate">-</p></article>
        <article class="card"><h2>Average R</h2><p id="average-r">-</p></article>
        <article class="card"><h2>Max Drawdown</h2><p id="max-drawdown">-</p></article>
        <article class="card"><h2>Recent Trades</h2><p id="recent-trades">placeholder</p></article>
        <article class="card"><h2>Best Setups</h2><p id="best-setups">placeholder</p></article>
        <article class="card"><h2>Rule Violations</h2><p id="rule-violations">placeholder</p></article>
        <article class="card card-wide"><h2>Equity Curve</h2><p id="equity-curve">placeholder</p></article>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
